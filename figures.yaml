      moderated-t; positive NES = marker set higher in cases vs HC, negative
      NES = lower). F–J, Post-onset MS vs HC: same five visualizations.
      K–N, Pre vs post-onset (within MS): volcano, barplot, GO:BP,
      cell-type enrichment (NES polarity: up = higher post-onset than
      pre-onset, down = lower).
    panels:
      - { id: efig1A, letter: A, caption: "Combined volcano" }
      - { id: efig1B, letter: B, caption: "Combined barplot" }
      - { id: efig1C, letter: C, caption: "Combined GO:BP" }
      - { id: efig1D, letter: D, caption: "Combined cell-type heatmap" }
      - { id: efig1E, letter: E, caption: "Combined MS cell-type enrichment (fgsea NES vs HC)" }
      - { id: efig1F, letter: F, caption: "Post-onset volcano" }
      - { id: efig1G, letter: G, caption: "Post-onset barplot" }
      - { id: efig1H, letter: H, caption: "Post-onset GO:BP" }
      - { id: efig1I, letter: I, caption: "Post-onset cell-type heatmap" }
      - { id: efig1J, letter: J, caption: "Post-onset cell-type enrichment (fgsea NES vs HC)" }
      - { id: efig1K, letter: K, caption: "Pre vs post volcano" }
      - { id: efig1L, letter: L, caption: "Pre vs post barplot" }
      - { id: efig1M, letter: M, caption: "Pre vs post GO:BP" }
      - { id: efig1N, letter: "N", caption: "Pre vs post cell-type enrichment (fgsea NES)" }
