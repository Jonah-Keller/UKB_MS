# ============================================================================
# figures.yaml — UKB MS proteomics figure & table registry
# Ordering = publication order. Numbers regenerate from position.
# ============================================================================

figures:

  # ── Figure 1: Pre-onset MS plasma proteomic signature ─────────────────────
  - id: fig1_preonset_signature
    section: main
    caption: >-
      The pre-onset multiple sclerosis plasma proteomic signature in UK Biobank.
      a, Study design: UK Biobank blood draw relative to MS diagnosis, showing
      pre-onset (>0 years before diagnosis) and post-onset participants and
      age-matched healthy controls. b, UMAP of Olink proteome coloured by
      disease status. c, Volcano plot of pre-onset MS vs healthy controls
      (limma; age, sex, UMAP1/2 adjusted). d, Ranked barplot of top 20
      proteins by nominal P-value (pre-onset). e, GO:BP enrichment dotplot
      for up- and down-regulated pre-onset DEPs. f, STRING PPI network of
      pre-onset DEPs (edge weight ≥0.7; Louvain communities coloured).
      g, Walchli vascular and HPA CNS/immune cell-type expression heatmap
      for pre-onset DEPs (each DEP mapped to its single highest-expressing
      cell type). h, Cell-type enrichment (preranked fgsea on the pre-onset limma
      moderated-t statistic) against specificity-filtered Walchli vascular
      and HPA CNS/immune marker sets. Positive NES = marker set
      coordinately higher in pre-MS plasma than in matched healthy-control
      plasma; negative NES = lower. i, Pre-onset vs post-onset GO:BP
      pathway comparison heatmap.
    panels:
      - { id: fig1a, letter: a, caption: "Study design schematic" }
      - { id: fig1b, letter: b, caption: "UMAP cohort overview", span: 2 }
      - { id: fig1h, letter: h, caption: "Pre-onset cell-type enrichment (fgsea NES: HC vs pre-MS plasma)", rowspan: 2 }
      - { id: fig1c, letter: c, caption: "Pre-onset volcano" }
      - { id: fig1d, letter: d, caption: "Pre-onset ranked barplot (top 20)" }
      - { id: fig1e, letter: e, caption: "Pre-onset GO:BP enrichment" }
      - { id: fig1f, letter: f, caption: "Pre-onset PPI network" }
      - { id: fig1g, letter: g, caption: "Pre-onset Walchli+HPA cell-type expression heatmap", span: 2 }
      - { id: fig1i, letter: i, caption: "Pre vs post GO:BP pathway comparison" }
    panels_dir: results/figures/1
    composite:
      ncol: 4
    output:
      pdf: manuscript/submission/main_figures/Figure_1_Preonset_Signature.pdf
      png: manuscript/submission/main_figures/Figure_1_Preonset_Signature.png
    source: analysis/manuscript/figure1.R

  # ── Figure 2: Temporal proteomic window ───────────────────────────────────
  - id: fig2_temporal_window
    section: main
    caption: >-
      The temporal proteomic window in pre-diagnostic multiple sclerosis.
      a, Distribution of blood-draw timing relative to MS diagnosis.
      b–e, Restricted cubic spline trajectories for NEFL, ERBB2, GFAP, and MOG
      across −8 to +12 years relative to diagnosis (blue ribbon = 95% CI;
      grey band = HC mean ±1 SD; arrow = earliest divergence from HC).
      f–h, Trajectories of the top immune/inflammatory pre-onset DEPs
      (KIR3DL1, OSM, OMG) across the same window. i, Pre-onset vs post-onset
      logFC concordance scatter. j, Temporal protein heatmap (all MS by
      2-year bin). k, Cox model rolling hazard ratio.
      l, SHAP feature importance for pre-onset classifier.
      m, ML ROC curves for full-cohort vs pre-onset classifiers.
      n, Pre-diagnostic proteomic risk score by time-to-diagnosis bin.
      o, PRS × NEFL interaction trajectory.
      p, Temporal proteomic landscape summary.
    panels:
      - { id: fig2a, letter: a, caption: "Sampling window distribution" }
      - { id: fig2b, letter: b, caption: "NEFL trajectory" }
      - { id: fig2c, letter: c, caption: "ERBB2 trajectory" }
      - { id: fig2d, letter: d, caption: "GFAP trajectory" }
      - { id: fig2e, letter: e, caption: "MOG trajectory" }
      - { id: fig2f, letter: f, caption: "KIR3DL1 trajectory" }
      - { id: fig2g, letter: g, caption: "OSM trajectory" }
      - { id: fig2h, letter: h, caption: "OMG trajectory" }
      - { id: fig2i, letter: i, caption: "Pre vs post logFC scatter" }
      - { id: fig2j, letter: j, caption: "Temporal protein heatmap" }
      - { id: fig2k, letter: k, caption: "Cox rolling hazard ratio" }
      - { id: fig2l, letter: l, caption: "SHAP feature importance" }
      - { id: fig2m, letter: m, caption: "ML ROC curves" }
      - { id: fig2n, letter: "n", caption: "Pre-diagnostic risk score by time bin" }
      - { id: fig2o, letter: o, caption: "PRS × NEFL trajectory" }
      - { id: fig2p, letter: p, caption: "Temporal landscape summary" }
    panels_dir: results/figures/2
    composite:
      ncol: 4
    output:
      pdf: manuscript/submission/main_figures/Figure_2_Temporal_Window.pdf
      png: manuscript/submission/main_figures/Figure_2_Temporal_Window.png
    source: analysis/manuscript/figure2.R

  # ── Figure 3: Genetic heterogeneity (HLA + PRS) ───────────────────────────
  - id: fig3_genetic_heterogeneity
    section: main
    caption: >-
      Genetic heterogeneity in the MS proteomic signature: HLA and polygenic
      risk. a, HLA allele landscape in MS vs HC (LD-pruned, Fisher test).
      b, Within-MS proteomic differences by HLA-DRB1*15:01 carrier status.
      c, Sex stratification of HLA-associated proteome.
      d, LILRB4 plasma trajectory by HLA status.
      e, HLA-stratified logFC scatter (carrier vs non-carrier).
      f, GO:BP enrichment of HLA-associated DEPs.
      g, LILRB4 trajectory stratified by HLA and disease stage.
      h, LILRB4 trajectory stratified by sex and HLA.
      i, IL2RA trajectory by PRS tertile.
      j, GO:BP enrichment of PRS-correlated proteins.
      k, LILRB4/IL2RA scatter by genetic group.
    panels:
      - { id: fig3a, letter: a, caption: "HLA allele landscape" }
      - { id: fig3b, letter: b, caption: "Within-MS HLA DEPs" }
      - { id: fig3c, letter: c, caption: "Sex comparison of HLA proteome" }
      - { id: fig3d, letter: d, caption: "LILRB4 trajectory" }
      - { id: fig3e, letter: e, caption: "HLA-stratified logFC scatter" }
      - { id: fig3f, letter: f, caption: "HLA GO:BP enrichment" }
      - { id: fig3g, letter: g, caption: "LILRB4 by HLA and stage" }
      - { id: fig3h, letter: h, caption: "LILRB4 by sex and HLA" }
      - { id: fig3i, letter: i, source: j, caption: "IL2RA by PRS tertile" }
      - { id: fig3j, letter: j, source: l, caption: "PRS GO:BP enrichment" }
      - { id: fig3k, letter: k, source: "n", caption: "LILRB4/IL2RA scatter", colspan: 2 }
    panels_dir: results/figures/3
    composite:
      ncol: 3
    output:
      pdf: manuscript/submission/main_figures/Figure_3_Genetic_Heterogeneity.pdf
      png: manuscript/submission/main_figures/Figure_3_Genetic_Heterogeneity.png
    source: analysis/manuscript/figure3.R

  # ── Figure 4: Sex differences ─────────────────────────────────────────────
  - id: fig4_sex_differences
    section: main
    caption: >-
      Sex differences in the multiple sclerosis proteomic signature.
      a, Female vs male logFC scatter across the full proteome, coloured by
      biological compartment (CNS/vascular/immune). b, DEP landscape:
      female-specific, concordant, discordant, and male-specific proteins.
      c–d, Female-specific DEPs: Walchli+HPA cell-type expression heatmap
      (c) and GO:BP enrichment (d). e–f, Male-specific DEPs: Walchli+HPA
      cell-type expression heatmap (e) and GO:BP enrichment (f).
      g–h, Sex-stratified trajectories for top female-specific (CHGA, g)
      and male-specific (ENPP5, h) markers. i, Pre-onset sex differences:
      female vs male logFC scatter coloured by full-cohort category.
      j, Sex-stratified ML ROC curves (female/male × combined/pre-onset/
      post-onset, 6 curves).
    panels:
      - { id: fig4a, letter: a, caption: "Female vs male logFC scatter" }
      - { id: fig4b, letter: b, caption: "DEP landscape" }
      - { id: fig4c, letter: c, caption: "Female DEP cell-type heatmap", colspan: 2 }
      - { id: fig4d, letter: d, caption: "Female GO:BP enrichment", colspan: 2, rowspan: 2 }
      - { id: fig4e, letter: e, caption: "Male DEP cell-type heatmap", colspan: 2 }
      - { id: fig4f, letter: f, caption: "Male GO:BP enrichment", colspan: 2 }
      - { id: fig4g, letter: g, caption: "CHGA sex-stratified trajectory", colspan: 2 }
      - { id: fig4h, letter: h, caption: "ENPP5 sex-stratified trajectory", colspan: 2 }
      - { id: fig4i, letter: i, caption: "Pre-onset sex differences scatter" }
      - { id: fig4j, letter: j, caption: "Sex-stratified ML ROC (6 curves)", colspan: 3 }
    panels_dir: results/figures/4
    composite:
      ncol: 4
    output:
      pdf: manuscript/submission/main_figures/Figure_4_Sex_Differences.pdf
      png: manuscript/submission/main_figures/Figure_4_Sex_Differences.png
    source: analysis/manuscript/figure4.R

  # ── Figure 5: Comorbidity endophenotypes ──────────────────────────────────
  - id: fig5_endophenotypes
    section: main
    caption: >-
      Pre-diagnostic comorbidity endophenotypes reveal proteomic and genetic
      heterogeneity in MS. a, Pre-MS comorbidity PheWAS lollipop: 23 conditions
      FDR<0.05 enriched or depleted before MS diagnosis. b, UMAP of pre-MS
      patients by comorbidity block profile; three clusters (C0/C1/C2) identified
      by k-means (k=3, silhouette=0.864). c, ICD block prevalence heatmap by
      cluster. d, Age at diagnosis by cluster. e, HLA-DRB1*15:01 carrier rate
      by cluster (Fisher test vs None shown). f, MS polygenic risk score by
      cluster (KW test). g–i, Volcano plots for C0, C1, and C2 vs MS-None
      (limma, PSM-matched controls). j, GO:BP enrichment for C2 (headline
      cluster). k, Cross-cluster GO:BP dotplot. l, Forest plot of LOOCV AUC by
      cluster for pre-MS classifier with 95% CI. Per-cluster GO:BP (C0/C1),
      PPI chord diagrams, and cell-type enrichment (fgsea NES vs MS-None)
      are in Extended Data Figures 6–8.
    panels:
      - { id: fig5a, letter: a, source: a, caption: "Pre-MS PheWAS (23 FDR<0.05)", colspan: 2, rowspan: 2 }
      - { id: fig5b, letter: b, source: b, caption: "Comorbidity cluster UMAP" }
      - { id: fig5c, letter: c, source: c, caption: "ICD block prevalence heatmap" }
      - { id: fig5d, letter: d, source: d, caption: "Age at diagnosis by cluster" }
      - { id: fig5e, letter: e, source: e, caption: "HLA carrier rate by cluster" }
      - { id: fig5f, letter: f, source: f, caption: "PRS by cluster" }
      - { id: fig5g, letter: g, source: g, caption: "C0 vs None volcano" }
      - { id: fig5h, letter: h, source: h, caption: "C1 vs None volcano" }
      - { id: fig5i, letter: i, source: i, caption: "C2 vs None volcano" }
      - { id: fig5j, letter: j, source: l, caption: "C2 GO:BP enrichment (headline)" }
      - { id: fig5k, letter: k, source: m, caption: "Cross-cluster GO:BP" }
      - { id: fig5l, letter: l, source: v, caption: "Pre-MS prediction AUC forest plot" }
    panels_dir: results/figures/5
    composite:
      ncol: 3
    output:
      pdf: manuscript/submission/main_figures/Figure_5_Endophenotypes.pdf
      png: manuscript/submission/main_figures/Figure_5_Endophenotypes.png
    source: analysis/manuscript/figure5.R

  # ── Extended Data Fig. 1: Full analysis supplement (Fig 1) ───────────────────────────
  - id: efig1_full_analyses
