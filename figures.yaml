  # ── Extended Data Fig. 2: Trajectory supplement ──────────────────────────────────────
  - id: efig2_trajectories
    section: supplement
    caption: >-
      Additional biomarker trajectories (supplement to the main temporal
      proteomic window figure). a, GFAP trajectory (no pre-onset divergence;
      first divergence at +5.0 yr after diagnosis; shown here with extended
      annotation). b, MOG trajectory (no significant divergence from HC at
      any time point; shown here with extended annotation). c, BGN trajectory
      (nominal pre-onset DEP and female-specific FDR-significant pre-onset
      DEP). d, ERBB2 trajectory stratified by MS polygenic risk quartile
      (counterpart to main Fig. 2o NEFL), with PRS×time interaction test;
      lowest (Q1) vs highest (Q4) PRS quartiles shown with 95% CI, Q2/Q3
      dashed, age/sex adjusted.
    panels:
      - { id: efig2a, letter: a, caption: "GFAP trajectory" }
      - { id: efig2b, letter: b, caption: "MOG trajectory" }
      - { id: efig2c, letter: c, caption: "BGN trajectory" }
      - { id: efig2d, letter: d, caption: "ERBB2 PRS-stratified trajectory" }
    panels_dir: results/figures/2_supp
    composite:
      ncol: 2
    output:
      pdf: manuscript/submission/supplementary/Extended Data Fig.s/Extended Data Fig._2_Trajectories.pdf
      png: manuscript/submission/supplementary/Extended Data Fig.s/Extended Data Fig._2_Trajectories.png
    source: analysis/manuscript/figure2_supp.R

